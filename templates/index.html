<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hybrid Book Recommendation System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a);
        }

        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .gradient-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
        }

        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(10px);}
            to {opacity: 1; transform: translateY(0);}
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #6366f1;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body class="text-gray-200 min-h-screen">

<!-- HERO -->
<section class="py-20 text-center px-4">
    <h1 class="text-4xl md:text-6xl font-bold mb-6 bg-gradient-to-r from-indigo-300 to-purple-300 text-transparent bg-clip-text">
        Hybrid Book Recommendation System
    </h1>
    <p class="text-lg text-gray-400 mb-10">
        AI-powered intelligent ranking using metadata & clustering
    </p>

    <div class="max-w-2xl mx-auto flex glass rounded-xl overflow-hidden">
        <input 
            id="searchInput"
            type="text"
            placeholder="Search for a book..."
            class="w-full bg-transparent px-6 py-4 focus:outline-none text-white"
        >
        <button 
            id="searchBtn"
            class="gradient-btn px-8 text-white font-semibold">
            Search
        </button>
    </div>
</section>

<!-- RESULTS -->
<section class="container mx-auto px-6 pb-20">

    <h2 class="text-2xl font-bold mb-6">Recommendations</h2>

    <div id="loading" class="hidden text-center py-10">
        <div class="spinner mx-auto"></div>
        <p class="mt-4 text-gray-400">Analyzing books...</p>
    </div>

    <div id="resultsContainer" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="text-gray-500 text-center col-span-3">
            Search to see recommendations.
        </div>
    </div>

</section>

<!-- SIMILAR BOOKS MODAL -->
<div id="similarModal" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center z-50">
    <div class="glass p-8 rounded-xl w-11/12 max-w-2xl relative fade-in">

        <button onclick="closeModal()" 
            class="absolute top-4 right-4 text-gray-400 hover:text-white text-xl">
            ✕
        </button>

        <h2 class="text-2xl font-bold mb-6 text-indigo-300">
            Similar Books
        </h2>

        <div id="similarContent" class="space-y-4">
        </div>

    </div>
</div>

<footer class="text-center py-6 border-t border-gray-800 text-gray-500">
    © 2026 Hybrid Book Recommendation System
</footer>

<script>
const searchBtn = document.getElementById("searchBtn");
const searchInput = document.getElementById("searchInput");
const resultsContainer = document.getElementById("resultsContainer");
const loading = document.getElementById("loading");

searchBtn.addEventListener("click", searchBooks);

searchInput.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        searchBooks();
    }
});

async function searchBooks() {

    const query = searchInput.value.trim();
    if (!query) return;

    resultsContainer.innerHTML = "";
    loading.classList.remove("hidden");

    try {
        const response = await fetch("/search", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: query })
        });

        const data = await response.json();

        loading.classList.add("hidden");
        displayResults(data);

    } catch (error) {
        loading.classList.add("hidden");
        resultsContainer.innerHTML = `
            <div class="text-red-400 col-span-3 text-center">
                Error fetching recommendations.
            </div>
        `;
    }
}

function displayResults(books) {

    resultsContainer.innerHTML = "";

    if (books.length === 0) {
        resultsContainer.innerHTML = `
            <div class="col-span-3 text-center text-gray-400">
                No results found.
            </div>
        `;
        return;
    }

    books.forEach(book => {

        const card = document.createElement("div");
        card.className = "glass p-6 rounded-xl fade-in hover:scale-105 transition";

        const safeTitle = book.title.replace(/'/g, "\\'");

        card.innerHTML = `
            <h3 class="text-xl font-semibold mb-2">${book.title}</h3>
            <p class="text-gray-400 mb-2">${book.author}</p>
            <p class="text-yellow-400">⭐ Rating: ${book.rating}</p>
            <p class="text-indigo-300 font-semibold">
                Hybrid Score: ${(book.score * 100).toFixed(2)}%
            </p>
            <button onclick="getSimilar('${safeTitle}')" 
                class="mt-3 bg-indigo-600 px-4 py-2 rounded-lg text-sm hover:bg-indigo-700 transition">
                View Similar
            </button>
        `;

        resultsContainer.appendChild(card);
    });
}

async function getSimilar(title) {

    const modal = document.getElementById("similarModal");
    const content = document.getElementById("similarContent");

    content.innerHTML = "Loading...";
    modal.classList.remove("hidden");
    modal.classList.add("flex");

    try {
        const response = await fetch("/similar", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title: title })
        });

        const data = await response.json();

        if (data.length === 0) {
            content.innerHTML = "<p>No similar books found.</p>";
            return;
        }

        content.innerHTML = "";

        data.forEach(book => {
            content.innerHTML += `
                <div class="glass p-4 rounded-lg">
                    <h3 class="font-semibold text-lg">${book.title}</h3>
                    <p class="text-gray-400">${book.author}</p>
                    <p class="text-yellow-400">⭐ ${book.rating}</p>
                </div>
            `;
        });

    } catch (error) {
        content.innerHTML = "<p class='text-red-400'>Error loading similar books.</p>";
    }
}

function closeModal() {
    const modal = document.getElementById("similarModal");
    modal.classList.add("hidden");
    modal.classList.remove("flex");
}

window.onclick = function(event) {
    const modal = document.getElementById("similarModal");
    if (event.target === modal) {
        closeModal();
    }
}
</script>

</body>
</html>
